apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "assops.fullname" . }}-config
  labels:
    {{- include "assops.labels" . | nindent 4 }}
data:
  ASSOPS_ADDR: ":8080"
  ASSOPS_GATEWAY_URL: {{ .Values.gatewayURL | quote }}
  ASSOPS_CONTEXT_DIR: /var/lib/assops/context
  ASSOPS_LOCAL_BARE_BASE_DIRS: {{ .Values.env.localBareBaseDirs | quote }}
  ASSOPS_CONFIG_GIT_LOCAL_BARE_WRITES_ENABLED: {{ .Values.env.configGitLocalBareWritesEnabled | quote }}
  ASSOPS_ENABLE_PROVIDER_REVIEW_EXECUTION: {{ .Values.env.providerReviewExecutionEnabled | quote }}
  ASSOPS_ARM_PROVIDER_REVIEW_MUTATION: {{ .Values.env.providerReviewMutationArmed | quote }}
  ASSOPS_APPROVAL_WEBHOOK_URL: {{ .Values.env.approvalWebhookURL | quote }}
  ASSOPS_VERSION: {{ .Values.env.version | quote }}
  ASSOPS_COMMIT: {{ .Values.env.commit | quote }}
  ASSOPS_BUILD_TIME: {{ .Values.env.buildTime | quote }}
  ASSOPS_WORKER_INTERVAL_SECONDS: {{ .Values.env.workerIntervalSeconds | quote }}
  ASSOPS_LOCAL_WORKER_ENABLED: {{ .Values.env.localWorkerEnabled | quote }}
  ASSOPS_CLOUDFLARE_QUEUES_ENABLED: {{ .Values.env.cloudflareQueuesEnabled | quote }}
  ASSOPS_CLOUDFLARE_ACCOUNT_ID: {{ .Values.env.cloudflareAccountID | quote }}
  ASSOPS_CLOUDFLARE_QUEUES_API_BASE: {{ .Values.env.cloudflareQueuesAPIBase | quote }}
  ASSOPS_CLOUDFLARE_WORKER_EVENTS_QUEUE_ID: {{ .Values.env.cloudflareWorkerEventsQueueID | quote }}
  ASSOPS_CLOUDFLARE_TASK_QUEUE_ID: {{ .Values.env.cloudflareTaskQueueID | quote }}
  ASSOPS_CLOUDFLARE_QUEUE_PULL_BATCH_SIZE: {{ .Values.env.cloudflareQueuePullBatchSize | quote }}
  ASSOPS_CLOUDFLARE_QUEUE_VISIBILITY_TIMEOUT_MS: {{ .Values.env.cloudflareQueueVisibilityTimeoutMS | quote }}
  ASSOPS_WORKER_HEALTH_ADDR: ":8081"
  ASSOPS_NODE_WORKER_HEALTH_ADDR: ":8082"
  ASSOPS_SSH_KEY_DIR: /etc/assops/ssh/keys
  ASSOPS_SSH_KNOWN_HOSTS_DIR: /etc/assops/ssh/known_hosts
  ASSOPS_KUBERNETES_LOGS_ENABLED: {{ .Values.env.kubernetesLogsEnabled | quote }}
  ASSOPS_KUBERNETES_LOG_PREVIEW_ENABLED: {{ .Values.env.kubernetesLogPreviewEnabled | quote }}
  ASSOPS_KUBERNETES_RESTARTS_ENABLED: {{ .Values.env.kubernetesRestartsEnabled | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "assops.fullname" . }}-nginx
  labels:
    {{- include "assops.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://{{ include "assops.fullname" . }}-gateway:8080;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /healthz {
        proxy_pass http://{{ include "assops.fullname" . }}-gateway:8080;
        proxy_http_version 1.1;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
