apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "assops.fullname" . }}-gateway
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "assops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "assops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: {{ include "assops.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.securityContext.pod }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "assops.image" (list . .Values.image.gateway) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext.containers.default }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "assops.fullname" . }}-config
            - secretRef:
                name: {{ include "assops.secretName" . }}
          volumeMounts:
            - name: context
              mountPath: /var/lib/assops/context
            - name: bare-repos
              mountPath: /var/lib/assops/bare-repos
            - name: ssh
              mountPath: /etc/assops/ssh
              readOnly: true
            - name: kubeconfigs
              mountPath: /etc/assops/kubeconfigs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: context
          {{- if .Values.persistence.context.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "assops.fullname" . }}-context
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: bare-repos
          {{- if .Values.persistence.bareRepos.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "assops.fullname" . }}-bare-repos
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: ssh
          {{- if .Values.persistence.ssh.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "assops.fullname" . }}-ssh
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: kubeconfigs
          {{- if .Values.persistence.kubeconfigs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "assops.fullname" . }}-kubeconfigs
          {{- else }}
          emptyDir: {}
          {{- end }}
---
