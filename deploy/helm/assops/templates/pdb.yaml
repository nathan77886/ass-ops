{{- if .Values.podDisruptionBudget.enabled }}
{{- $components := list "gateway" "node-worker" "web" }}
{{- if .Values.legacyWorker.enabled }}
{{- $components = append $components "worker" }}
{{- end }}
{{- range $component := $components }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "assops.fullname" $ }}-{{ $component }}
  labels:
    {{- include "assops.labels" $ | nindent 4 }}
spec:
  minAvailable: {{ $.Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "assops.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $component | quote }}
---
{{- end }}
{{- end }}
