{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "assops.fullname" . }}-postgres
  labels:
    {{- include "assops.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "assops.fullname" . }}-postgres
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.postgres.storageClassName }}
  storageClassName: {{ .Values.postgres.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.storageSize }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "assops.fullname" . }}-postgres
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "assops.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "assops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "assops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: assops
            - name: POSTGRES_DB
              value: assops
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "assops.fullname" . }}-postgres
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "assops", "-d", "assops"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "assops.fullname" . }}-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "assops.fullname" . }}-postgres
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    {{- include "assops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
