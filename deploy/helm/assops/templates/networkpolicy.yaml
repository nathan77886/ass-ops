{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "assops.fullname" . }}-web
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "assops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{ range .Values.networkPolicy.web.ingressCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{ end }}
      ports:
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "assops.fullname" . }}-gateway
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "assops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{ range .Values.networkPolicy.gateway.allowedComponents }}
        - podSelector:
            matchLabels:
              {{- include "assops.selectorLabels" $ | nindent 14 }}
              app.kubernetes.io/component: {{ . | quote }}
        {{ end }}
      ports:
        - protocol: TCP
          port: 8080
{{- if .Values.postgres.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "assops.fullname" . }}-postgres
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "assops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{ range .Values.networkPolicy.postgres.allowedComponents }}
        - podSelector:
            matchLabels:
              {{- include "assops.selectorLabels" $ | nindent 14 }}
              app.kubernetes.io/component: {{ . | quote }}
        {{ end }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
{{- end }}
