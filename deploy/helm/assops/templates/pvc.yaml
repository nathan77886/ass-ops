{{- if .Values.persistence.context.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "assops.fullname" . }}-context
  labels:
    {{- include "assops.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.persistence.context.storageClassName }}
  storageClassName: {{ .Values.persistence.context.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.context.size }}
---
{{- end }}
