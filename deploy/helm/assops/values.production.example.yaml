replicaCount: 1

gatewayURL: https://assops.example.com

# Replace the assops-retain placeholder with an environment-reviewed
# StorageClass before enabling deploy=true.

secret:
  create: false
  name: assops-production-secret

postgres:
  enabled: false

ingress:
  enabled: true
  className: nginx
  host: assops.example.com
  tlsSecretName: assops-production-tls

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

image:
  registry: ghcr.io
  pullPolicy: IfNotPresent
  pullSecrets: []
  gateway:
    repository: nathan77886/assops-gateway
    tag: v0.1.0
  worker:
    repository: nathan77886/assops-worker
    tag: v0.1.0
  nodeWorker:
    repository: nathan77886/assops-node-worker
    tag: v0.1.0
  web:
    repository: nathan77886/assops-web
    tag: v0.1.0

env:
  approvalWebhookURL: ""
  version: v0.1.0
  commit: reviewed-release-commit
  buildTime: reviewed-release-build-time
  workerIntervalSeconds: "3"
  scheduleConfigPath: ""
  schedulerSnapshotCleanupEnabled: "true"
  schedulerSnapshotCleanupRunAt: "03:30"
  schedulerSnapshotCleanupRetentionDays: "30"
  schedulerSnapshotCleanupBatchSize: "1000"
  schedulerSnapshotCleanupKeepLatestPerAsset: "true"
  localBareBaseDirs: /var/lib/assops/bare-repos
  configGitLocalBareWritesEnabled: "false"
  providerReviewExecutionEnabled: "false"
  providerReviewMutationArmed: "false"
  kubernetesLogsEnabled: "false"
  kubernetesRestartsEnabled: "false"

persistence:
  context:
    enabled: true
    size: 5Gi
    storageClassName: assops-retain
  bareRepos:
    enabled: true
    size: 10Gi
    storageClassName: assops-retain
  ssh:
    enabled: true
    size: 1Gi
    storageClassName: assops-retain
  backups:
    enabled: true
    size: 20Gi
    storageClassName: assops-retain

web:
  service:
    type: ClusterIP
    port: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  pod:
    seccompProfile:
      type: RuntimeDefault
  containers:
    default:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      capabilities:
        drop:
          - ALL
    migrate:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      capabilities:
        drop:
          - ALL
    web:
      allowPrivilegeEscalation: false

networkPolicy:
  enabled: true
  web:
    ingressCIDRs:
      - 0.0.0.0/0
  gateway:
    allowedComponents:
      - web
      - node-worker
  postgres:
    allowedComponents:
      - gateway
      - worker
      - migrate

podDisruptionBudget:
  enabled: true
  minAvailable: 1
