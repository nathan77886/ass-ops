x-assops-env: &assops-env
  DATABASE_URL: postgres://assops:${ASSOPS_POSTGRES_PASSWORD:-assops}@postgres:5432/assops?sslmode=disable
  ASSOPS_ADDR: :8080
  # Public/browser-facing origin used when displaying webhook URLs.
  # Node workers override this with the in-cluster service URL for API calls.
  ASSOPS_GATEWAY_URL: ${ASSOPS_GATEWAY_URL:-http://localhost:8080}
  ASSOPS_CONTEXT_DIR: /var/lib/assops/context
  ASSOPS_LOCAL_BARE_BASE_DIRS: /var/lib/assops/bare-repos
  ASSOPS_CONFIG_GIT_LOCAL_BARE_WRITES_ENABLED: ${ASSOPS_CONFIG_GIT_LOCAL_BARE_WRITES_ENABLED:-false}
  ASSOPS_JWT_SECRET: ${ASSOPS_JWT_SECRET:-dev-assops-change-me}
  ASSOPS_WEBHOOK_SECRET_KEY: ${ASSOPS_WEBHOOK_SECRET_KEY:-dev-assops-webhook-change-me}
  ASSOPS_APPROVAL_WEBHOOK_URL: ${ASSOPS_APPROVAL_WEBHOOK_URL:-}
  ASSOPS_APPROVAL_WEBHOOK_TOKEN: ${ASSOPS_APPROVAL_WEBHOOK_TOKEN:-}
  ASSOPS_ENABLE_PROVIDER_REVIEW_EXECUTION: ${ASSOPS_ENABLE_PROVIDER_REVIEW_EXECUTION:-false}
  ASSOPS_ARM_PROVIDER_REVIEW_MUTATION: ${ASSOPS_ARM_PROVIDER_REVIEW_MUTATION:-false}
  ASSOPS_ADMIN_EMAIL: ${ASSOPS_ADMIN_EMAIL:-admin@assops.local}
  ASSOPS_ADMIN_PASSWORD: ${ASSOPS_ADMIN_PASSWORD:-admin1234}
  ASSOPS_GITHUB_TEMPLATE_TOKEN: ${ASSOPS_GITHUB_TEMPLATE_TOKEN:-}
  ASSOPS_GITEA_TEMPLATE_TOKEN: ${ASSOPS_GITEA_TEMPLATE_TOKEN:-}
  ASSOPS_GITHUB_ACTIONS_READ_TOKEN: ${ASSOPS_GITHUB_ACTIONS_READ_TOKEN:-}
  ASSOPS_ARGO_READ_TOKEN: ${ASSOPS_ARGO_READ_TOKEN:-}
  ASSOPS_KUBERNETES_LOGS_ENABLED: ${ASSOPS_KUBERNETES_LOGS_ENABLED:-false}
  ASSOPS_KUBERNETES_RESTARTS_ENABLED: ${ASSOPS_KUBERNETES_RESTARTS_ENABLED:-false}
  ASSOPS_KUBECONFIG_SECRET_DIR: /etc/assops/kubeconfigs
  ASSOPS_KUBECTL_PATH: ${ASSOPS_KUBECTL_PATH:-kubectl}
  ASSOPS_SSH_KEY_DIR: /etc/assops/ssh/keys
  ASSOPS_SSH_KNOWN_HOSTS_DIR: /etc/assops/ssh/known_hosts
  ASSOPS_WORKER_INTERVAL_SECONDS: ${ASSOPS_WORKER_INTERVAL_SECONDS:-3}
  ASSOPS_WORKER_HEALTH_ADDR: :8081
  ASSOPS_NODE_WORKER_HEALTH_ADDR: :8082

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assops
      POSTGRES_PASSWORD: ${ASSOPS_POSTGRES_PASSWORD:-assops}
      POSTGRES_DB: assops
    ports:
      - "${ASSOPS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - assops_pg:/var/lib/postgresql/data
      - ../backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ../backend/migrations/002_git_first_version.sql:/docker-entrypoint-initdb.d/002_git_first_version.sql:ro
      - ../backend/migrations/003_provider_accounts.sql:/docker-entrypoint-initdb.d/003_provider_accounts.sql:ro
      - ../backend/migrations/004_approval_saved_views.sql:/docker-entrypoint-initdb.d/004_approval_saved_views.sql:ro
      - ../backend/migrations/005_agent_tool_call_audit.sql:/docker-entrypoint-initdb.d/005_agent_tool_call_audit.sql:ro
      - ../backend/migrations/006_asset_graph_saved_views.sql:/docker-entrypoint-initdb.d/006_asset_graph_saved_views.sql:ro
      - ../backend/migrations/007_multi_approver_approvals.sql:/docker-entrypoint-initdb.d/007_multi_approver_approvals.sql:ro
      - ../backend/migrations/008_asset_status_snapshots.sql:/docker-entrypoint-initdb.d/008_asset_status_snapshots.sql:ro
      - ../backend/migrations/009_approval_reminders.sql:/docker-entrypoint-initdb.d/009_approval_reminders.sql:ro
      - ../backend/migrations/010_approval_rule_audit.sql:/docker-entrypoint-initdb.d/010_approval_rule_audit.sql:ro
      - ../backend/migrations/011_approval_escalations.sql:/docker-entrypoint-initdb.d/011_approval_escalations.sql:ro
      - ../backend/migrations/012_approval_delegations.sql:/docker-entrypoint-initdb.d/012_approval_delegations.sql:ro
      - ../backend/migrations/013_provider_review_approval_rule.sql:/docker-entrypoint-initdb.d/013_provider_review_approval_rule.sql:ro
      - ../backend/migrations/014_provider_review_attempts.sql:/docker-entrypoint-initdb.d/014_provider_review_attempts.sql:ro
      - ../backend/migrations/015_provider_review_attempt_dependencies.sql:/docker-entrypoint-initdb.d/015_provider_review_attempt_dependencies.sql:ro
      - ../backend/migrations/016_project_versions_unique.sql:/docker-entrypoint-initdb.d/016_project_versions_unique.sql:ro
      - ../backend/migrations/017_webhook_threshold_decision_audits.sql:/docker-entrypoint-initdb.d/017_webhook_threshold_decision_audits.sql:ro
      - ../backend/migrations/018_webhook_threshold_configurations.sql:/docker-entrypoint-initdb.d/018_webhook_threshold_configurations.sql:ro
      - ../backend/migrations/019_provider_review_attempt_claims.sql:/docker-entrypoint-initdb.d/019_provider_review_attempt_claims.sql:ro
      - ../backend/migrations/020_github_action_artifacts.sql:/docker-entrypoint-initdb.d/020_github_action_artifacts.sql:ro
      - ../backend/migrations/021_kubernetes_environments.sql:/docker-entrypoint-initdb.d/021_kubernetes_environments.sql:ro
      - ../backend/migrations/022_github_repository_labels.sql:/docker-entrypoint-initdb.d/022_github_repository_labels.sql:ro
      - ../backend/migrations/023_kubernetes_pod_restart_access.sql:/docker-entrypoint-initdb.d/023_kubernetes_pod_restart_access.sql:ro
      - ../backend/migrations/024_provider_review_live_execution.sql:/docker-entrypoint-initdb.d/024_provider_review_live_execution.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assops -d assops"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: ..
      target: gateway
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    environment:
      <<: *assops-env
    volumes:
      - assops_context:/var/lib/assops/context
      - assops_bare_repos:/var/lib/assops/bare-repos
      - assops_ssh:/etc/assops/ssh:ro
      - assops_kubeconfigs:/etc/assops/kubeconfigs:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost$${ASSOPS_ADDR}/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

  worker:
    build:
      context: ..
      target: worker
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    environment:
      <<: *assops-env
    volumes:
      - assops_context:/var/lib/assops/context
      - assops_bare_repos:/var/lib/assops/bare-repos
      - assops_ssh:/etc/assops/ssh:ro
      - assops_kubeconfigs:/etc/assops/kubeconfigs:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost$${ASSOPS_WORKER_HEALTH_ADDR}/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

  node-worker:
    build:
      context: ..
      target: node-worker
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    # "control-worker" is reserved for the built-in control worker queue.
    command: ["-name", "local-node", "-kind", "local", "-capabilities", "echo,git,ssh,ai"]
    environment:
      <<: *assops-env
      ASSOPS_GATEWAY_URL: http://gateway:8080
    volumes:
      - assops_ssh:/etc/assops/ssh:ro
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost$${ASSOPS_NODE_WORKER_HEALTH_ADDR}/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

  web:
    build:
      context: ..
      target: web
    ports:
      - "${ASSOPS_WEB_PORT:-8080}:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  assops_pg:
  assops_context:
  assops_bare_repos:
  assops_ssh:
  assops_kubeconfigs:
