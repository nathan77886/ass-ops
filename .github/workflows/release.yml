name: Release Candidate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

jobs:
  artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Resolve version
        id: version
        run: |
          ref_name="${GITHUB_REF_NAME:-manual}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ref_name="manual-${GITHUB_SHA::12}"
          fi
          echo "value=${ref_name}" >> "$GITHUB_OUTPUT"

      - name: Build Go binaries
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          mkdir -p dist/bin
          for cmd in gateway worker node-worker assops-tool; do
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/bin/${cmd}" "./backend/cmd/${cmd}"
          done
          tar -C dist/bin -czf "dist/assops-${VERSION}-linux-amd64.tar.gz" .

      - name: Build web bundle
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          pnpm -C web install --frozen-lockfile
          pnpm -C web build
          tar -C web/dist -czf "dist/assops-web-${VERSION}.tar.gz" .

      - name: Package Helm chart
        run: |
          helm lint deploy/helm/assops
          helm lint deploy/helm/assops -f deploy/helm/assops/values.production.example.yaml
          helm template assops deploy/helm/assops -f deploy/helm/assops/values.production.example.yaml >/tmp/assops-production-rendered.yaml
          helm package deploy/helm/assops --destination dist

      - name: Generate checksums
        run: |
          (cd dist && sha256sum ./*.tar.gz ./*.tgz > SHA256SUMS)

      - name: Validate release artifact layout
        run: |
          cat > dist/restore-rehearsal-ci.json <<'JSON'
          {
            "backup": "/backups/assops-ci.dump",
            "target_database": "postgres://assops@postgres:5432/assops_restore_test?sslmode=disable",
            "backup_object_counts": {
              "TABLE": 1
            },
            "migrations": [
              {
                "filename": "001_init.sql"
              }
            ],
            "rehearsed_at": "2026-06-22T00:00:00Z"
          }
          JSON
          go run ./backend/cmd/assops-tool release validate-bundle dist dist/restore-rehearsal-ci.json

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.tgz
            dist/SHA256SUMS

      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: assops-release-${{ steps.version.outputs.value }}
          path: |
            dist/*.tar.gz
            dist/*.tgz
            dist/SHA256SUMS
          if-no-files-found: error

  docker-smoke:
    name: Docker Image Smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - gateway
          - worker
          - node-worker
          - web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          tags: assops/${{ matrix.target }}:release-candidate

  docker-publish:
    name: Publish GHCR Images (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - artifacts
      - docker-smoke
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        target:
          - gateway
          - worker
          - node-worker
          - web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tags
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          owner_lower="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lower}/assops-${TARGET}"
          {
            echo "name=${image}"
            echo "versioned=${image}:${VERSION}"
            echo "sha=${image}:${GITHUB_SHA::12}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ steps.image.outputs.versioned }}
            ${{ steps.image.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest ${{ matrix.target }} image
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
