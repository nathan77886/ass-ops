name: Build Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - gateway
          - worker
          - node-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          TARGET: ${{ matrix.target }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          owner_lower="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          version="$REF_NAME"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="manual-${GITHUB_SHA::12}"
          fi
          image="ghcr.io/${owner_lower}/assops-${TARGET}"
          {
            echo "name=${image}"
            echo "versioned=${image}:${version}"
            echo "sha=${image}:${GITHUB_SHA::12}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ steps.image.outputs.versioned }}
            ${{ steps.image.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
