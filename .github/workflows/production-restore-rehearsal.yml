name: Production Backup Restore Rehearsal

on:
  schedule:
    # Disabled by default unless ASSOPS_PRODUCTION_RESTORE_REHEARSAL_ENABLED=true
    # is configured at the repository/environment variable layer.
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      github_environment:
        description: GitHub environment that stores rehearsal database secrets
        required: true
        default: production
        type: string
      runner:
        description: Runner label; use self-hosted only when it mounts backup_path
        required: true
        default: ubuntu-latest
        type: string
      backup_artifact_name:
        description: Optional workflow artifact name containing one assops-*.dump backup
        required: false
        type: string
      backup_path:
        description: Optional runner-local backup path, for self-hosted environments
        required: false
        type: string
      report_name:
        description: Artifact/report name for the rehearsal result
        required: true
        default: production-restore-rehearsal
        type: string
      artifact_retention_days:
        description: Days to retain the private rehearsal report artifact
        required: true
        default: 30
        type: number

permissions:
  actions: write
  contents: read

concurrency:
  group: production-restore-rehearsal-${{ github.event_name == 'workflow_dispatch' && inputs.github_environment || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_ENVIRONMENT || 'production' }}
  cancel-in-progress: false

jobs:
  rehearse:
    name: Production Backup Restore Rehearsal
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_ENABLED == 'true' }}
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.github_environment || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_ENVIRONMENT || 'production' }}
    env:
      # Optional active database URL; used only so assops-tool can refuse rehearsal
      # targets that accidentally point at the real database.
      DATABASE_URL: ${{ secrets.ASSOPS_ACTIVE_DATABASE_URL }}
      TARGET_DATABASE_URL: ${{ secrets.ASSOPS_REHEARSAL_DATABASE_URL }}
      PGPASSWORD: ${{ secrets.ASSOPS_REHEARSAL_DATABASE_PASSWORD }}
      INPUT_BACKUP_ARTIFACT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.backup_artifact_name || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_BACKUP_ARTIFACT }}
      INPUT_BACKUP_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.backup_path || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_BACKUP_PATH }}
      INPUT_REPORT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.report_name || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_REPORT_NAME || 'production-restore-rehearsal-scheduled' }}
      INPUT_ARTIFACT_RETENTION_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_retention_days || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_RETENTION_DAYS || '30' }}
      REPORT_PATH: dist/rehearsal/${{ github.event_name == 'workflow_dispatch' && inputs.report_name || vars.ASSOPS_PRODUCTION_RESTORE_REHEARSAL_REPORT_NAME || 'production-restore-rehearsal-scheduled' }}.json
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16 unzip || sudo apt-get install -y postgresql-client unzip
          pg_restore --version

      - name: Build assops-tool
        run: |
          mkdir -p bin dist/rehearsal .assops/input-backup
          go build -trimpath -o bin/assops-tool ./backend/cmd/assops-tool

      - name: Validate rehearsal inputs
        run: |
          test -n "$TARGET_DATABASE_URL" || (echo "ASSOPS_REHEARSAL_DATABASE_URL environment secret is required" && exit 1)
          case "$INPUT_REPORT_NAME" in
            ""|*[!A-Za-z0-9._-]*)
              echo "report_name must contain only letters, numbers, dot, underscore, or hyphen"
              exit 1
              ;;
          esac
          case "$INPUT_BACKUP_ARTIFACT_NAME" in
            *[!A-Za-z0-9._-]*)
              echo "backup_artifact_name must contain only letters, numbers, dot, underscore, or hyphen"
              exit 1
              ;;
          esac
          if [ -n "$INPUT_BACKUP_PATH" ] && printf '%s' "$INPUT_BACKUP_PATH" | grep -q '[^A-Za-z0-9/._@=:+-]'; then
            echo "backup_path must contain only letters, numbers, slash, dot, underscore, at, equals, colon, plus, or hyphen"
            exit 1
          fi
          if [ -n "$INPUT_BACKUP_ARTIFACT_NAME" ] && [ -n "$INPUT_BACKUP_PATH" ]; then
            echo "Use either backup_artifact_name or backup_path, not both"
            exit 1
          fi
          if [ -z "$INPUT_BACKUP_ARTIFACT_NAME" ] && [ -z "$INPUT_BACKUP_PATH" ]; then
            echo "backup_artifact_name or backup_path is required"
            exit 1
          fi
          case "$INPUT_ARTIFACT_RETENTION_DAYS" in
            ""|*[!0-9]*)
              echo "artifact_retention_days must be a number"
              exit 1
              ;;
          esac
          if [ "$INPUT_ARTIFACT_RETENTION_DAYS" -lt 1 ] || [ "$INPUT_ARTIFACT_RETENTION_DAYS" -gt 90 ]; then
            echo "artifact_retention_days must be between 1 and 90"
            exit 1
          fi

      - name: Download retained backup artifact
        if: ${{ env.INPUT_BACKUP_ARTIFACT_NAME != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts" --paginate \
              --jq '.artifacts[] | select(.name == env.INPUT_BACKUP_ARTIFACT_NAME and .expired == false) | .id' \
              | head -n 1
          )"
          test -n "$artifact_id" || (echo "No unexpired artifact named $INPUT_BACKUP_ARTIFACT_NAME found" && exit 1)
          if ! gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > .assops/input-backup/backup-artifact.zip; then
            rm -f .assops/input-backup/backup-artifact.zip
            echo "Failed to download retained backup artifact $INPUT_BACKUP_ARTIFACT_NAME"
            exit 1
          fi
          unzip -tq .assops/input-backup/backup-artifact.zip >/dev/null
          unzip -q .assops/input-backup/backup-artifact.zip -d .assops/input-backup
          dump_count="$(find .assops/input-backup -type f -name 'assops-*.dump' | wc -l | tr -d ' ')"
          if [ "$dump_count" != "1" ]; then
            echo "Retained backup artifact must contain exactly one assops-*.dump file; found $dump_count"
            exit 1
          fi
          if find .assops/input-backup -type f \( \
            -iname '.env*' -o \
            -iname '*.env' -o \
            -iname '*kubeconfig*' -o \
            -iname '*.kubeconfig' -o \
            -iname '*.log' -o \
            -iname '*.key' -o \
            -iname '*.pem' \
          \) | grep -q .; then
            echo "Retained backup artifact contains disallowed secret/log-like files"
            exit 1
          fi

      - name: Resolve backup path
        id: backup
        run: |
          if [ -n "$INPUT_BACKUP_PATH" ]; then
            backup="$INPUT_BACKUP_PATH"
          else
            backup="$(find .assops/input-backup -type f -name 'assops-*.dump' | sort | tail -n 1)"
          fi
          test -n "$backup" || (echo "No assops-*.dump backup found" && exit 1)
          test -f "$backup" || (echo "Backup file not found: $backup" && exit 1)
          printf '%s\n' "path=$backup" >> "$GITHUB_OUTPUT"

      - name: Rehearse restore from retained backup
        run: |
          bin/assops-tool db rehearse-restore \
            "${{ steps.backup.outputs.path }}" \
            "$TARGET_DATABASE_URL" \
            "$REPORT_PATH"

      - name: Validate rehearsal report
        run: |
          cat > /tmp/validate-production-rehearsal-report.py <<'PY'
          import datetime
          import json
          import os

          report_path = os.environ["REPORT_PATH"]
          with open(report_path, encoding="utf-8") as handle:
              report = json.load(handle)
          required = [
              "backup",
              "target_database",
              "inspect_line_count",
              "backup_object_counts",
              "restore_output_lines",
              "migrations",
              "rehearsed_at",
          ]
          missing = [key for key in required if key not in report]
          if missing:
              raise SystemExit(f"missing report fields: {missing}")
          if not report["backup_object_counts"]:
              raise SystemExit("backup_object_counts is empty")
          if not report["migrations"]:
              raise SystemExit("migrations is empty")
          if "://" not in report["target_database"]:
              raise SystemExit("target_database must be URL-style")
          if "@" in report["target_database"].split("://", 1)[1].split("/", 1)[0] and ":" in report["target_database"].split("://", 1)[1].split("@", 1)[0]:
              raise SystemExit("target_database must not include a password")
          datetime.datetime.fromisoformat(report["rehearsed_at"].replace("Z", "+00:00"))
          PY
          python3 /tmp/validate-production-rehearsal-report.py

      - name: Upload private rehearsal report
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.INPUT_REPORT_NAME }}
          retention-days: ${{ env.INPUT_ARTIFACT_RETENTION_DAYS }}
          path: ${{ env.REPORT_PATH }}
          if-no-files-found: error
