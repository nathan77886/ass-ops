name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish assets to, for example v0.0.1"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  node-worker:
    name: Build node-worker ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/node-worker-linux-${GOARCH}" ./backend/cmd/node-worker
          (cd dist && sha256sum "node-worker-linux-${GOARCH}" > "node-worker-linux-${GOARCH}.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-worker-linux-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish binary release assets
    runs-on: ubuntu-latest
    needs: node-worker
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: node-worker-linux-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          case "$TAG" in v*) ;; *) echo "release_tag must start with v" >&2; exit 1 ;; esac
          gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1 || gh release create "$TAG" --repo "$GH_REPO" --title "$TAG" --notes ""
          gh release upload "$TAG" release-assets/* --repo "$GH_REPO" --clobber
