name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  node-worker:
    name: Build node-worker ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/node-worker-linux-${GOARCH}" ./backend/cmd/node-worker
          (cd dist && sha256sum "node-worker-linux-${GOARCH}" > "node-worker-linux-${GOARCH}.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-worker-linux-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish binary release assets
    runs-on: ubuntu-latest
    needs: node-worker
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-worker-linux-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes ""
          gh release upload "$TAG" release-assets/* --clobber
